version: 2

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    settings:
      shadow:
        strict: false

  gocyclo:
    min-complexity: 15

  goconst:
    min-len: 3
    min-occurrences: 3

  misspell:
    locale: US

  lll:
    line-length: 140

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocyclo
    - misspell
    - goconst
    - gocritic
    - revive

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - .uf
    - .opencode
    - openspec

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
