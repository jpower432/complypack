name: Container Image

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: read

jobs:
  push:
    uses: complytime/org-infra/.github/workflows/reusable_publish_ghcr.yml@main
    permissions:
      contents: read
      packages: write
      actions: read
      id-token: write
      attestations: write
    with:
      component_name: complypack
      containerfile_path: Containerfile
      context_path: .
      image_name: complytime/complypack
      image_description: "ComplyPack MCP server for compliance policy generation"
      platforms: linux/amd64,linux/arm64

  sign:
    needs: push
    uses: complytime/org-infra/.github/workflows/reusable_sign_and_verify.yml@main
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      image_name: ${{ needs.push.outputs.image }}
      digest: ${{ needs.push.outputs.digest }}
      allowed_identity_regex: "https://github.com/complytime/.*"
      verify_vuln: false
